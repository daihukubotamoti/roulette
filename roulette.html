<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ルーレット</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      color: #f8fafc;
      min-height: 100vh;
      padding: 20px;
    }
    .screen {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
    }
    .hidden { display: none; }
    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 2rem;
    }
    .sub {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
    }
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 18px;
    }
    .card h2 {
      margin: 0 0 14px;
      font-size: 1.05rem;
      color: #e2e8f0;
    }
    label {
      display: block;
      margin: 0 0 8px;
      font-size: 0.95rem;
      color: #cbd5e1;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 1rem;
      margin-bottom: 12px;
    }
    option { color: black; }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .row input { margin-bottom: 0; }
    .item-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      max-height: 280px;
      overflow: auto;
    }
    .item-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .item-chip span { word-break: break-word; }
    .mini-btn, .main-btn {
      border: none;
      cursor: pointer;
      font-weight: 800;
      transition: transform .15s ease, opacity .15s ease;
    }
    .mini-btn:hover, .main-btn:hover { transform: translateY(-1px); }
    .mini-btn:active, .main-btn:active { transform: translateY(1px); }
    .mini-btn {
      padding: 8px 12px;
      border-radius: 999px;
      background: #475569;
      color: #fff;
      white-space: nowrap;
    }
    .danger-btn { background: #7f1d1d; }
    .main-btn {
      padding: 14px 22px;
      border-radius: 999px;
      font-size: 1rem;
    }
    .primary { background: #f8fafc; color: #0f172a; }
    .secondary { background: #334155; color: #f8fafc; }
    .full { width: 100%; }
    .note {
      color: #94a3b8;
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .play-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      min-height: calc(100vh - 80px);
    }
    .top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .status {
      color: #cbd5e1;
      font-size: 0.95rem;
    }
    .wheel-wrap {
      position: relative;
      width: min(78vw, 420px);
      height: min(78vw, 420px);
    }
    .pointer {
      position: absolute;
      top: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 38px solid #f8fafc;
      z-index: 5;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4));
    }
    .wheel {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 10px solid #e2e8f0;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0,0,0,0.35);
    }
    .labels { position: absolute; inset: 0; }
    .label {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 0 0;
      font-weight: 800;
      font-size: 14px;
      color: #0f172a;
      white-space: nowrap;
      text-shadow: 0 1px 0 rgba(255,255,255,0.35);
    }
    .center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 106px; height: 106px;
      border-radius: 50%;
      background: #fff;
      color: #0f172a;
      font-weight: 900;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 3;
      border: 6px solid #0f172a;
      line-height: 1.1;
    }
    .action-btn {
      min-width: 220px;
      padding: 16px 28px;
      border-radius: 999px;
      border: none;
      font-size: 1.15rem;
      font-weight: 900;
      cursor: pointer;
      background: #f8fafc;
      color: #0f172a;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      transition: transform .15s ease, opacity .15s ease;
    }
    .action-btn:hover { transform: translateY(-1px); }
    .action-btn:active { transform: translateY(1px); }
    .result-box {
      min-height: 58px;
      text-align: center;
    }
    .result-title {
      font-size: 0.95rem;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    .result-value {
      font-size: 1.8rem;
      font-weight: 900;
    }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="setupScreen" class="screen">
    <h1>ルーレット</h1>
    <div class="sub">最初に項目と演出設定をしてから、ルーレット画面へ進みます。</div>

    <div class="grid">
      <div class="card">
        <h2>項目を追加</h2>
        <div class="row">
          <input id="newItemInput" type="text" placeholder="例: 大当たり、ジュース、罰ゲーム" />
          <button id="addItemBtn" class="mini-btn">追加</button>
        </div>
        <div class="note">最低2項目必要です。Enterキーでも追加できます。</div>

        <div id="itemList" class="item-list"></div>
      </div>

      <div class="card">
        <h2>結果設定</h2>
        <label for="targetSelect">止めたい結果</label>
        <select id="targetSelect"></select>

        <label for="hitTurnInput">何回目にその結果を出すか</label>
        <input id="hitTurnInput" type="number" min="1" value="3" />

        
        <button id="startGameBtn" class="main-btn primary full">ルーレット画面へ</button>
        <div id="setupMessage" class="note" style="margin-top: 10px;">設定すると次の画面に進めます。</div>
      </div>
    </div>
  </div>

  <div id="playScreen" class="screen hidden">
    <div class="play-wrap">
      <div class="top-bar">
        <div>
          <h1 style="margin:0; text-align:left;">ルーレット</h1>
          <div id="statusText" class="status">1回目の挑戦です</div>
        </div>
        <button id="backBtn" class="main-btn secondary">設定へ戻る</button>
      </div>

      <div class="wheel-wrap">
        <div class="pointer"></div>
        <div id="wheel" class="wheel">
          <div id="labels" class="labels"></div>
          <div class="center">ROU<br>LETTE</div>
        </div>
      </div>

      <button id="actionBtn" class="action-btn">スタート</button>

      <div class="result-box">
        <div class="result-title">結果</div>
        <div id="resultValue" class="result-value">---</div>
      </div>
    </div>
  </div>

  <script>
    const defaultItems = ['大当たり', 'もう1回', 'ジュース', 'お菓子'];

    const setupScreen = document.getElementById('setupScreen');
    const playScreen = document.getElementById('playScreen');
    const newItemInput = document.getElementById('newItemInput');
    const addItemBtn = document.getElementById('addItemBtn');
    const itemList = document.getElementById('itemList');
    const targetSelect = document.getElementById('targetSelect');
    const hitTurnInput = document.getElementById('hitTurnInput');    const startGameBtn = document.getElementById('startGameBtn');
    const setupMessage = document.getElementById('setupMessage');
    const backBtn = document.getElementById('backBtn');
    const statusText = document.getElementById('statusText');
    const wheel = document.getElementById('wheel');
    const labels = document.getElementById('labels');
    const actionBtn = document.getElementById('actionBtn');
    const resultValue = document.getElementById('resultValue');

    let items = [...defaultItems];
    let currentRotation = 0;
    let isRunning = false;
    let isStopping = false;
    let spinLoop = null;
    let spinAttempt = 0;
    let forcedTurn = 3;
    let forcedTargetIndex = 0;
    let spinSpeed = 1680;
    let currentVisualRotation = 0;
    let lastFrameTime = null;

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderItems() {
      itemList.innerHTML = '';
      items.forEach((item, index) => {
        const row = document.createElement('div');
        row.className = 'item-chip';
        row.innerHTML = `<span>${escapeHtml(item)}</span><button class="mini-btn danger-btn" data-index="${index}">削除</button>`;
        itemList.appendChild(row);
      });

      Array.from(itemList.querySelectorAll('button')).forEach(btn => {
        btn.addEventListener('click', () => {
          const index = Number(btn.dataset.index);
          if (items.length <= 2) {
            setupMessage.textContent = '項目は2つ以上必要です。';
            return;
          }
          items.splice(index, 1);
          updateSetupUi();
        });
      });
    }

    function renderTargetOptions() {
      targetSelect.innerHTML = '';
      items.forEach((item, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.textContent = item;
        targetSelect.appendChild(option);
      });
      if (forcedTargetIndex >= items.length) forcedTargetIndex = 0;
      targetSelect.value = String(forcedTargetIndex);
    }

    function updateSetupUi() {
      renderItems();
      renderTargetOptions();
      setupMessage.textContent = `現在の項目数: ${items.length}`;
    }

    function buildWheel() {
      const count = items.length;
      const segmentDeg = 360 / count;
      const palette = ['#f87171', '#fb923c', '#facc15', '#4ade80', '#22d3ee', '#60a5fa', '#a78bfa', '#f472b6', '#fda4af', '#86efac', '#fdba74', '#93c5fd'];
      const gradientParts = items.map((_, i) => {
        const start = i * segmentDeg;
        const end = (i + 1) * segmentDeg;
        return `${palette[i % palette.length]} ${start}deg ${end}deg`;
      });
      wheel.style.background = `conic-gradient(${gradientParts.join(', ')})`;

      labels.innerHTML = '';
      const radius = count <= 4 ? 125 : count <= 6 ? 135 : count <= 8 ? 145 : 150;
      const fontSize = count >= 10 ? 11 : count >= 8 ? 12 : 14;

      items.forEach((item, i) => {
        const label = document.createElement('div');
        label.className = 'label';
        label.style.fontSize = `${fontSize}px`;
        const angle = i * segmentDeg + segmentDeg / 2 - 90;
        label.style.transform = `rotate(${angle}deg) translate(${radius}px) rotate(90deg)`;
        label.textContent = item;
        labels.appendChild(label);
      });
    }

    function startVisualSpin() {
      wheel.style.transition = 'none';
      lastFrameTime = null;

      const animate = (timestamp) => {
        if (!isRunning) return;
        if (lastFrameTime == null) lastFrameTime = timestamp;
        const delta = (timestamp - lastFrameTime) / 1000;
        lastFrameTime = timestamp;
        currentVisualRotation += spinSpeed * delta;
        wheel.style.transform = `rotate(${currentVisualRotation}deg)`;
        spinLoop = requestAnimationFrame(animate);
      };

      spinLoop = requestAnimationFrame(animate);
    }

    function stopSpin() {
      if (!isRunning || isStopping) return;
      isStopping = true;
      isRunning = false;
      cancelAnimationFrame(spinLoop);

      const count = items.length;
      const segmentDeg = 360 / count;
      const currentTurn = spinAttempt + 1;
      const chosenIndex = currentTurn === forcedTurn
        ? forcedTargetIndex
        : Math.floor(Math.random() * count);

      const targetCenterDeg = chosenIndex * segmentDeg + segmentDeg / 2;
      const finalOffset = (360 - targetCenterDeg) % 360;
      const extraSpins = 1 + Math.floor(Math.random() * 2);
      const normalizedCurrent = ((currentVisualRotation % 360) + 360) % 360;
      const deltaToTarget = ((finalOffset - normalizedCurrent) + 360) % 360;
      const finalRotation = currentVisualRotation + extraSpins * 360 + deltaToTarget;

      wheel.style.transition = 'transform 0.85s cubic-bezier(0.2, 0.95, 0.25, 1)';
      wheel.style.transform = `rotate(${finalRotation}deg)`;
      currentRotation = finalRotation % 360;
      currentVisualRotation = finalRotation;

      setTimeout(() => {
        spinAttempt += 1;
        resultValue.textContent = items[chosenIndex];
        statusText.textContent = `${spinAttempt + 1}回目の挑戦です`;
        actionBtn.textContent = 'スタート';
        isStopping = false;
      }, 850);
    }

    function resetPlayState() {
      isRunning = false;
      isStopping = false;
      cancelAnimationFrame(spinLoop);
      wheel.style.transition = 'none';
      wheel.style.transform = 'rotate(0deg)';
      currentRotation = 0;
      currentVisualRotation = 0;
      spinAttempt = 0;
      resultValue.textContent = '---';
      statusText.textContent = '1回目の挑戦です';
      actionBtn.textContent = 'スタート';
    }

    function addItem() {
      const value = newItemInput.value.trim();
      if (!value) {
        setupMessage.textContent = '項目名を入力してください。';
        return;
      }
      items.push(value);
      newItemInput.value = '';
      updateSetupUi();
    }

    addItemBtn.addEventListener('click', addItem);
    newItemInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addItem();
    });

    startGameBtn.addEventListener('click', () => {
      if (items.length < 2) {
        setupMessage.textContent = '項目は2つ以上必要です。';
        return;
      }

      forcedTargetIndex = Number(targetSelect.value);
      forcedTurn = Math.max(1, Number(hitTurnInput.value) || 1);
      spinSpeed = 1680;

      buildWheel();
      resetPlayState();
      setupScreen.classList.add('hidden');
      playScreen.classList.remove('hidden');
    });

    backBtn.addEventListener('click', () => {
      resetPlayState();
      playScreen.classList.add('hidden');
      setupScreen.classList.remove('hidden');
    });

    actionBtn.addEventListener('click', () => {
      if (isStopping) return;

      if (!isRunning) {
        resultValue.textContent = '...';
        actionBtn.textContent = 'ストップ';
        isRunning = true;
        startVisualSpin();
      } else {
        actionBtn.textContent = '停止中...';
        stopSpin();
      }
    });

    updateSetupUi();
    buildWheel();
  </script>
</body>
</html>
